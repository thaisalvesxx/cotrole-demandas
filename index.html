<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubmarket · Gestão</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="mobile-topbar">
  <button class="icon-btn" id="btnOpenSidebar"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg></button>
  <div class="brand brand--mobile"><span class="brand-mark">H</span><span>Hubmarket</span></div>
  <button class="icon-btn" id="btnThemeMobile"><svg viewBox="0 0 24 24"><path d="M12 3v2M12 19v2" stroke-linecap="round"/><circle cx="12" cy="12" r="4.5"/></svg></button>
</header>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-mark">H</span>
      <div class="brand-text"><strong>Hubmarket</strong><small>Painel de Gestão</small></div>
    </div>
    <nav class="nav" id="mainNav">
      <button class="nav-item is-active" data-section="dashboard"><span>Painel</span></button>
      <button class="nav-item" data-section="tasks"><span>Tarefas</span></button>
      <button class="nav-item" data-section="recurring"><span>Recorrentes</span></button>
      <button class="nav-item" data-section="goals"><span>Metas</span></button>
      <button class="nav-item" data-section="followup"><span>Acompanhamento</span></button>
      <button class="nav-item" data-section="calendar"><span>Calendário</span></button>
      <button class="nav-item" data-section="reports"><span>Relatórios</span></button>
      <button class="nav-item" data-section="settings"><span>Configurações</span></button>
    </nav>
    <div class="sidebar-footer">
      <button class="icon-btn" id="btnTheme"><span>Alternar Tema</span></button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap"><input type="text" id="globalSearch" placeholder="Buscar..."></div>
      <div class="topbar-right"><span id="topbarDate"></span><div class="avatar">EA</div></div>
    </div>
    <div id="searchResults" class="search-results hidden"></div>

    <div class="content">
      <section class="view" id="view-dashboard">
        <div class="view-head"><h1>Painel</h1></div>
        <div class="cards-grid" id="dashCards"></div>
      </section>

      <section class="view hidden" id="view-tasks">
        <div class="view-head"><h1>Tarefas</h1></div>
        <div class="toolbar">
          <button class="btn btn-primary" id="btnNewTask">+ Nova Tarefa</button>
        </div>
        <div class="kanban" id="kanbanBoard"></div>
      </section>

      <section class="view hidden" id="view-recurring">
        <div class="view-head"><h1>Recorrentes</h1></div>
        <div class="toolbar"><button class="btn btn-primary" id="btnNewRecurring">+ Nova Recorrência</button></div>
        <div class="table-wrap"><table class="data-table" id="recurringTable"><thead><tr><th>Nome</th><th>Categoria</th><th>Recorrência</th><th></th></tr></thead><tbody></tbody></table></div>
      </section>

      <section class="view hidden" id="view-goals">
        <div class="view-head"><h1>Metas</h1></div>
        <div class="toolbar"><button class="btn btn-primary" id="btnNewGoal">+ Nova Meta</button></div>
        <div class="goals-grid" id="goalsGrid"></div>
      </section>

      <section class="view hidden" id="view-followup">
        <div class="view-head"><h1>Acompanhamento</h1></div>
        <div class="toolbar"><button class="btn btn-primary" id="btnNewFollowUp">+ Novo</button></div>
        <div class="table-wrap"><table class="data-table" id="followUpTable"><thead><tr><th>Assunto</th><th>Marketplace</th><th>Prazo</th><th></th></tr></thead><tbody></tbody></table></div>
      </section>

      <section class="view hidden" id="view-calendar">
        <div class="view-head"><h1>Calendário</h1></div>
        <div class="calendar-toolbar">
          <button class="btn" id="calPrev">Anterior</button>
          <h2 id="calLabel"></h2>
          <button class="btn" id="calNext">Próximo</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="view hidden" id="view-reports">
        <div class="view-head"><h1>Relatórios</h1></div>
        <div class="panel" id="reportOutput"></div>
      </section>

      <section class="view hidden" id="view-settings">
        <div class="view-head"><h1>Configurações</h1></div>
        <div class="settings-grid">
          <div class="panel">
            <h3>Categorias</h3>
            <div id="settingsCategoriesList" class="settings-list"></div>
            <div class="settings-add">
              <input type="text" id="inputNewCategory" placeholder="Nova...">
              <button class="btn btn-primary" id="btnAddCategory">Add</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<div class="modal-overlay hidden" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
